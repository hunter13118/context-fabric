name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20.x", "22.x"]
    name: node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # No committed lockfile in this prototype, so use `npm install`.
      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Smoke-test the demo (offline mock provider)
        run: npm run demo
        env:
          CF_DB_PATH: ":memory:"
          CF_AI_PROVIDER: mock
          CF_EMBED_PROVIDER: mock
